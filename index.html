<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Family Guild Invite</title>
    <style>
        /* --- Phông chữ và Cài đặt cơ bản --- */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Ngăn cuộn trang */
            background-color: #050510; /* Màu nền tối sâu */
        }

        /* --- Vùng chứa chính (Căn giữa mọi thứ) --- */
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2; /* Nằm trên lớp nền */
            text-align: center;
            color: #ffffff;
            padding: 20px;
        }

        /* --- Lớp nền Hạt hạt chuyển động --- */
        .background-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* Hiệu ứng gradient nền và hạt giả lập bằng background-image */
            background: 
                radial-gradient(circle at 10% 10%, rgba(0, 150, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(150, 0, 255, 0.1) 0%, transparent 40%),
                radial-gradient(white, rgba(255,255,255,.05) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 80px 80px;
            animation: particleAnimation 60s linear infinite;
            opacity: 0.6;
        }

        @keyframes particleAnimation {
            from { background-position: 0 0, 0 0, 0 0; }
            to { background-position: 0 0, 0 0, 1000px 1000px; }
        }

        /* --- Tiêu đề chính MASTER FAMILY | #1 (Hiệu ứng Neon) --- */
        .title {
            font-size: 3.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            /* Hiệu ứng đổ bóng chữ neon phức tạp */
            text-shadow: 
                0 0 5px rgba(255, 255, 255, 0.8),
                0 0 10px rgba(0, 200, 255, 0.6),
                0 0 20px rgba(0, 200, 255, 0.4),
                0 0 40px rgba(0, 200, 255, 0.2);
            margin-bottom: 10px;
            /* Hiệu ứng nhấp nháy nhẹ */
            animation: titlePulse 3s ease-in-out infinite alternate;
        }

        @keyframes titlePulse {
            from { opacity: 1; text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(0, 200, 255, 0.6); }
            to { opacity: 0.9; text-shadow: 0 0 10px rgba(255, 255, 255, 1), 0 0 20px rgba(0, 200, 255, 0.8), 0 0 30px rgba(0, 200, 255, 0.6); }
        }

        /* --- Dòng mô tả (Sub-title) --- */
        .subtitle {
            font-size: 1.1rem;
            color: #b9bbbe; /* Màu xám nhẹ của Discord */
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* --- Nút bấm KẾT NỐI NGAY --- */
        .discord-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 15px 40px;
            background: linear-gradient(135deg, #0077ff 0%, #00d4ff 100%);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.5); /* Đổ bóng phát sáng */
            position: relative;
            overflow: hidden;
        }

        /* Hiệu ứng khi di chuột qua nút (Hover) */
        .discord-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 0 35px rgba(0, 150, 255, 0.8);
        }

        /* Hiệu ứng khi nhấn nút (Active) */
        .discord-btn:active {
            transform: translateY(-1px) scale(1);
        }

        /* Logo Discord bên trong nút */
        .discord-icon {
            margin-right: 12px;
            width: 28px;
            height: 28px;
            fill: #ffffff; /* Màu logo trắng */
            filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.5));
        }

        /* --- Dòng chữ dưới nút --- */
        .footer-text {
            font-size: 1rem;
            color: #8e9297;
            margin-top: 15px;
            font-weight: 400;
        }

    </style>
</head>
<body>

    <div class="background-particles"></div>

    <div class="container">
        <h1 class="title">MASTER FAMILY | #1</h1>
        
        <p class="subtitle">Nếu bạn là thành viên Guild thì hãy vô Discord ngay nhé!</p>
        
        <a href="https://discord.gg/p7JeuXgRwX" class="discord-btn" target="_blank">
            <svg class="discord-icon" viewBox="0 0 127.14 96.36">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.87,56.6.38,80.1a105.77,105.77,0,0,0,32.63,16.26,77.7,77.7,0,0,0,6.89-11.11,64.8,64.8,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a64.59,64.59,0,0,1-10.85,5.18,77.39,77.39,0,0,0,6.89,11.11,105.2,105.2,0,0,0,32.63-16.26C129.58,52.86,124.4,28.9,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5.12-12.67,11.41-12.67S54,46,53.86,53,48.74,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.21,60,73.21,53s5.12-12.67,11.41-12.67S96,46,95.91,53,90.79,65.69,84.69,65.69Z"/>
            </svg>
            KẾT NỐI NGAY
        </a>
        
        <p class="footer-text">Tham gia ngay Discord</p>
    </div>

</body>
</html>
